services:
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: ftnds
      POSTGRES_PASSWORD: StrongPassword2026!
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - portfolio-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: portfolio-backend
    env_file:
      - .env
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: portfolio_db
      DB_USER: ftnds
      DB_PASSWORD: StrongPassword2026!
      JWT_SECRET: your-super-secret-jwt-key-change-this
    depends_on:
      - postgres
    networks:
      - portfolio-network
    restart: unless-stopped

  frontend:
    build: .
    container_name: portfolio-frontend
    networks:
      - portfolio-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - portfolio-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  portfolio-network:
    driver: bridge
