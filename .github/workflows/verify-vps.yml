name: Verify VPS SSH

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: Production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}

    steps:
      - name: Validate deploy secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then echo "::error::Missing VPS_HOST"; missing=1; fi
          if [ -z "$VPS_USER" ]; then echo "::error::Missing VPS_USER"; missing=1; fi
          if [ -z "$VPS_SSH_KEY" ]; then echo "::error::Missing VPS_SSH_KEY"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" -v -o BatchMode=yes -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" \
            'bash -s' << 'ENDSSH'
          set -e
          echo "SSH OK — connected as $(whoami) on $(hostname)"
          echo "Docker: $(docker --version 2>/dev/null || echo not installed)"
          if [ -d ~/portfolio-app ]; then
            cd ~/portfolio-app
            echo "Repo: $(git rev-parse --short HEAD 2>/dev/null || echo unknown) on $(git branch --show-current 2>/dev/null || echo unknown)"
            docker compose ps 2>/dev/null || true
            if [ -f .env ]; then
              echo ".env: present"
            else
              echo "WARN: .env not found"
            fi
          else
            echo "WARN: ~/portfolio-app not found"
          fi
          echo "Verify complete."
          ENDSSH
