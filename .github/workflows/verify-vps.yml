name: Verify VPS SSH

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: Production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      SSH_RETRIES: 4
      TCP_TIMEOUT: 45
      SSH_CONNECT_TIMEOUT: 45
      RETRY_DELAY: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then echo "::error::Missing VPS_HOST"; missing=1; fi
          if [ -z "$VPS_USER" ]; then echo "::error::Missing VPS_USER"; missing=1; fi
          if [ -z "$VPS_SSH_KEY" ]; then echo "::error::Missing VPS_SSH_KEY"; missing=1; fi
          if [ "$missing" -ne 0 ]; then exit 1; fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: bash scripts/github-ssh-retry.sh verify
