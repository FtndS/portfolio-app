name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            cd ~/portfolio-app
            echo "==> Pull latest code"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "ERROR: .env not found — create it on VPS first"
              exit 1
            fi

            if grep -qE '^JWT_SECRET=(your-super-secret-jwt-key-change-this|change-this-to-a-long-random-string)$' .env; then
              echo "WARN: JWT_SECRET is still default — run: ./scripts/generate-jwt-secret.sh"
            fi

            chmod +x scripts/backup-db.sh scripts/restore-db.sh scripts/setup-backup-cron.sh scripts/generate-jwt-secret.sh 2>/dev/null || true

            echo "==> Backup database before deploy"
            if [ -x scripts/backup-db.sh ]; then
              ./scripts/backup-db.sh pre-deploy || echo "WARN: backup failed — deploy continues"
            else
              echo "WARN: scripts/backup-db.sh not found"
            fi

            echo "==> Deployed commit: $(git rev-parse --short HEAD)"

            echo "==> Build & restart containers"
            docker compose build --no-cache frontend
            docker compose build backend
            docker compose up -d --force-recreate
            docker compose restart nginx

            health_ok() {
              docker compose exec -T backend node -e "
                fetch('http://127.0.0.1:3001/api/health')
                  .then((r) => r.json())
                  .then((d) => process.exit(d.status === 'ok' ? 0 : 1))
                  .catch(() => process.exit(1))
              " 2>/dev/null
            }

            echo "==> Wait for backend"
            for i in $(seq 1 30); do
              if health_ok; then
                echo "Backend healthy"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: Backend failed to start"
                docker compose ps
                docker compose logs backend --tail 80
                exit 1
              fi
              sleep 2
            done

            echo "==> Health check"
            docker compose ps
            health_ok && docker compose exec -T backend node -e "fetch('http://127.0.0.1:3001/api/health').then(r=>r.text()).then(t=>console.log(t))"
            echo ""
            echo "Deploy complete."
