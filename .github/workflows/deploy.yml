name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}

    steps:
      - name: Validate deploy secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Missing GitHub secret VPS_HOST (VPS IP or domain)"
            missing=1
          fi
          if [ -z "$VPS_USER" ]; then
            echo "::error::Missing GitHub secret VPS_USER (e.g. root)"
            missing=1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing GitHub secret VPS_SSH_KEY — see docs/DEPLOY.md"
            missing=1
          elif ! printf '%s' "$VPS_SSH_KEY" | grep -q 'BEGIN.*PRIVATE KEY'; then
            echo "::error::VPS_SSH_KEY must be the full private key including BEGIN/END lines"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "Secrets OK — will deploy to ${VPS_USER}@${VPS_HOST} port ${VPS_PORT:-22}"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if ! ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::warning::ssh-keyscan failed — will use StrictHostKeyChecking=accept-new"
          fi

      - name: Test SSH connection
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" \
            'echo "SSH OK — connected as $(whoami) on $(hostname)"'

      - name: Deploy on VPS
        run: |
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o StrictHostKeyChecking=accept-new \
            "${VPS_USER}@${VPS_HOST}" \
            'bash -s' << 'ENDSSH'
          set -euo pipefail
          if [ ! -d ~/portfolio-app/.git ]; then
            echo "ERROR: ~/portfolio-app is missing or not a git repo"
            exit 1
          fi
          cd ~/portfolio-app
          chmod +x scripts/deploy-vps.sh
          ./scripts/deploy-vps.sh
          ENDSSH
